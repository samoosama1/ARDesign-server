services:
  django:
    build: .
    container_name: django
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/django/media
    depends_on:
      - db
    environment:
      - POSTGRES_DB=arpatentdb
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=samet123
    networks:
      - shared-net

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: arpatentdb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: samet123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shared-net

volumes:
  postgres_data:
  media_data:

networks:
  shared-net:
