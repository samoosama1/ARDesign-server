name: arpatent

services:

  # -- PostgreSQL ---------------------------------------------------------------
  db:
    image: postgres:15
    container_name: arpatent_db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  # -- Redis --------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arpatent_redis
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # -- FastAPI ------------------------------------------------------------------
  api:
    build: .
    container_name: arpatent_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /app/media
    networks:
      - app-net

  # -- Celery worker ------------------------------------------------------------
  worker:
    build: .
    container_name: arpatent_worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - media_data:/app/media
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /app/media
      MEDIA_VOLUME_NAME: arpatent_media_data
    networks:
      - app-net

  # -- Nginx reverse proxy ------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: arpatent_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/app/frontend/dist:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - app-net

  # -- Certbot (SSL) ------------------------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: arpatent_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  postgres_data:
  media_data:
  frontend_dist:
  certbot_www:
  certbot_conf:

networks:
  app-net:
