name: arpatent-prod

# Shared docker log driver config — caps each container's json-file log at
# 30MB (10MB × 3 files) instead of unbounded growth that can fill the host
# disk and wedge writes across the daemon.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # -- PostgreSQL ---------------------------------------------------------------
  db:
    image: postgres:15
    container_name: arpatent_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10
    mem_limit: 2g
    pids_limit: 512
    logging: *default-logging

  # -- Redis --------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arpatent_redis
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    mem_limit: 512m
    pids_limit: 128
    logging: *default-logging

  # -- FastAPI ------------------------------------------------------------------
  api:
    image: arpatent-api:${APP_VERSION:-latest}
    container_name: arpatent_api
    # Gunicorn supervises uvicorn workers. --max-requests recycles each worker
    # after ~1000 requests (jittered) to bound memory leaks. --graceful-timeout
    # caps how long workers can hold up shutdown.
    command: >
      gunicorn app.main:app
      --bind 0.0.0.0:8000
      -k uvicorn.workers.UvicornWorker
      -w 4
      --max-requests 1000
      --max-requests-jitter 50
      --graceful-timeout 10
      --timeout 60
      --access-logfile -
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /app/media
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    mem_limit: 1g
    pids_limit: 256
    logging: *default-logging

  # -- Celery worker ------------------------------------------------------------
  worker:
    image: arpatent-api:${APP_VERSION:-latest}
    container_name: arpatent_worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1
    init: true
    restart: unless-stopped
    # 30s grace: with task_acks_late=True an in-flight conversion redelivers,
    # and the worker_process_init handler in celery_app.py prunes the
    # orphaned converter container on the next worker startup.
    stop_grace_period: 30s
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /app/media
      MEDIA_VOLUME_NAME: arpatent-prod_media_data
      DOCKER_HOST: tcp://socket-proxy:2375
    networks:
      - app-net
      - proxy-net
    mem_limit: 512m
    pids_limit: 256
    logging: *default-logging

  # -- Celery generator (GPU-bound Hunyuan3D tasks, concurrency=1) --------------
  # GPU serializes to one generation at a time; this worker is pinned to
  # concurrency=1 on the dedicated "generate" queue. No Docker socket needed
  # (it only makes HTTP calls to the host-native Hunyuan API server).
  generator:
    image: arpatent-api:${APP_VERSION:-latest}
    container_name: arpatent_generator
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1 -Q generate
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /app/media
      HUNYUAN_BASE_URL: http://host.docker.internal:8081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-net
    mem_limit: 1g
    pids_limit: 256
    logging: *default-logging

  # -- Docker socket proxy ------------------------------------------------------
  # Mediates the worker's Docker API calls so the raw socket is never exposed
  # to the celery process. Whitelists /containers/* only.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: arpatent_socket_proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy-net
    # No read_only: the image regenerates haproxy.cfg from a baked-in template
    # at /usr/local/etc/haproxy/ on every start, so that dir must be writable
    # and can't be a tmpfs (which would mask the template). Blast radius is
    # bounded by cap_drop + no-new-privileges + internal proxy-net + the
    # narrow CONTAINERS=1 POST=1 API surface below.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    mem_limit: 64m
    pids_limit: 64
    logging: *default-logging

  # -- Frontend build (one-shot) ------------------------------------------------
  # Builds the React SPA and drops dist/ into the frontend_dist volume that
  # nginx serves. Runs once per `up` and exits; nginx waits for it to finish.
  # To rebuild after source changes: `up -d --build frontend-builder`.
  frontend-builder:
    build:
      context: ./frontend
    container_name: arpatent_frontend_builder
    command: sh -c "rm -rf /dst/* && cp -r /app/dist/. /dst/"
    volumes:
      - frontend_dist:/dst
    restart: "no"
    logging: *default-logging

  # -- Nginx reverse proxy ------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: arpatent_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/app/frontend/dist:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      frontend-builder:
        condition: service_completed_successfully
    networks:
      - app-net
    mem_limit: 256m
    pids_limit: 64
    logging: *default-logging

  # -- Certbot (SSL) ------------------------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: arpatent_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    logging: *default-logging

volumes:
  postgres_data:
  media_data:
  frontend_dist:
  certbot_www:
  certbot_conf:

networks:
  app-net:
  proxy-net:
    internal: true
