server {
    listen 80;
    server_name _;

    # Re-resolve upstream hostnames at request time via Docker's embedded
    # DNS (always at 127.0.0.11). Without this, nginx caches the upstream
    # IP at startup and serves 502s forever when `api` is recreated with
    # a new IP (e.g. after `up -d api`).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Redirect all HTTP to HTTPS (enable after certbot setup)
    # return 301 https://$host$request_uri;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API requests
    location /api/ {
        set $api_upstream api;
        proxy_pass http://$api_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500M;
    }

    # Health check
    location /health {
        set $api_upstream api;
        proxy_pass http://$api_upstream:8000;
        proxy_set_header Host $host;
    }

    # React SPA — serve built frontend, fallback to index.html for client-side routing
    location / {
        root /app/frontend/dist;
        try_files $uri $uri/ /index.html;
        expires 1d;
    }
}

